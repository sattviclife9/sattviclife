<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Slider</title>

<!-- Flickity CSS -->
<link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* WRAPPER */
.hero-wrapper {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* SLIDER */
.hero-slider {
  height: 100%;
}

.carousel-cell {
  width: 100%;
  height: 100vh;
  background-size: cover;
  background-position: center;
}

/* CENTER BOX */
.hero-center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* CARD */
.center-card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  max-width: 500px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border-top: 5px solid #2bbbad;
}

.center-card h2 {
  font-size: 22px;
  margin-bottom: 10px;
}

.center-card p {
  font-size: 15px;
  margin-bottom: 10px;
}

.center-card span {
  font-size: 13px;
  color: gray;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero-wrapper">

  <!-- SLIDER -->
  <div class="hero-slider" data-carousel>
    <div class="carousel-cell" style="background-image:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzuXGrVBXZ05-aZ4X7NZ13iG0e27ddln5jyw&s');"></div>
    <div class="carousel-cell" style="background-image:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIWHr2KsL4gXnZcJusPIlzU5fNaaDBNX-4VQ&s');"></div>
    <div class="carousel-cell" style="background-image:url('https://media.post.rvohealth.io/wp-content/uploads/2024/02/Ayurvedic-header.jpg');"></div>
  </div>

  <!-- CENTER CONTENT -->
  <div class="hero-center-box">
    <div class="center-card">
      <h2>Prayojanam chasya swasthasya</h2>
      <p>
        The purpose of Ayurveda is to protect the health of the healthy 
        and to alleviate the disorders of the diseased.
      </p>
      <span>— Charaka Samhita</span>
    </div>
  </div>

</div>

<!-- Flickity JS -->
<script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>

<script>
var flkty = new Flickity('[data-carousel]', {
  autoPlay: 2500,
  wrapAround: true,
  prevNextButtons: false,
  pageDots: true,
  pauseAutoPlayOnHover: false
});
</script>

</body>
</html>
